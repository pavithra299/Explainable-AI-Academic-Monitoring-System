<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #0ea5e9
    );
}

.container{
    width:400px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:20px;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    color:#38bdf8;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:white;
}

</style>

</head>
<body>

<div class="container">

<h1>🚀 Explainable AI Academic Monitoring</h1>

<form action="/register" method="post">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">
Register
</button>

</form>

<br>

<center>
Already Registered?
<a href="/login">Login</a>
</center>

</div>

</body>
</html>
