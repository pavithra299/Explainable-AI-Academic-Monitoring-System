```html
<!DOCTYPE html>
<html>
<head>
    <title>Admin Registration</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 450px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2563eb;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        p {
            text-align: center;
            margin-top: 20px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>👨‍🏫 Admin Registration</h1>

    <form action="/admin-register" method="post">

        <input
            type="text"
            name="name"
            placeholder="Admin Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Admin Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <input
            type="text"
            name="access_code"
            placeholder="Admin Access Code"
            required
        >

        <button type="submit">
            Register Admin
        </button>

    </form>

    <p>
        Already registered?

        <a href="/admin-login">
            Login here
        </a>
    </p>

</div>

</body>
</html>
```
